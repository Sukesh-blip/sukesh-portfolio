  </div>

  <!-- Content Area -->
  <div class="flex-1 overflow-y-auto 900px:ml-80">
    <router-outlet></router-outlet>
  </div>

  <!-- Mobile Sidebar (bottom) -->
  <div class="block 900px:hidden mt-6 m-4" style="background-color: #ffffff; border-right: 1px solid #e5e7eb;">
