<div class="p-1.5 mt-4 mb-1 ml-1 mr-1 bg-white shadow-md animate-slideIn-1 900px:p-3 m-6">
  <div class="flex flex-col w-full">

    <!-- Section Header -->
    <div class="w-full">
      <button class="group p-1 relative bg-transparent inline-flex items-center w-full text-black font-medium
                     transition-all duration-200 ease-out hover:bg-transparent hover:shadow-none focus:outline-none
                     cursor-default 900px:p-4">
        <div class="text-left tracking-[0.2em] text-xl 900px:text-3xl font-bold m-2 uppercase animate-slideIn-2"
             style="font-family: 'Syne', sans-serif;">projects</div>
        <span class="absolute bottom-0 duration-500 ease-out group-hover:w-full h-0.5 left-0 transition-all w-0 bg-orange-400"></span>
        <span class="absolute duration-500 ease-out group-hover:w-full h-0.5 right-0 top-0 transition-all w-0 bg-orange-400"></span>
      </button>
      <hr class="border-t-2 border-black mb-4 mt-2 animate-slideIn-3">
    </div>

    <!-- Projects Grid -->
    <div class="grid grid-cols-1 gap-4 p-2 900px:grid-cols-2 animate-slideIn-4">
      <div *ngFor="let project of projects"
           class="bg-white border border-gray-200 shadow-sm p-3 900px:p-4
                  hover:border-blue-400 hover:shadow-lg transition-all duration-200 relative overflow-hidden group">

        <!-- Animated bottom accent line -->
        <div class="absolute bottom-0 left-0 w-0 h-0.5 bg-blue-500 transition-all duration-500 group-hover:w-full"></div>

        <!-- Title row -->
        <div class="flex items-start justify-between mb-2">
          <div class="font-bold text-sm uppercase tracking-[0.05em] pr-2">{{ project.name }}</div>
          <div class="flex gap-2 flex-shrink-0">
            <a *ngIf="project.githubUrl" [href]="project.githubUrl" target="_blank"
               class="text-gray-400 hover:text-gray-900 transition-colors" title="GitHub">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
              </svg>
            </a>
            <a *ngIf="project.liveUrl" [href]="project.liveUrl" target="_blank"
               class="text-blue-400 hover:text-blue-700 transition-colors" title="Live Demo">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
          </div>
        </div>

        <!-- Description -->
        <p class="text-gray-600 text-xs leading-relaxed mb-3">{{ project.description }}</p>

        <!-- Highlights -->
        <ul class="list-disc list-inside space-y-1 mb-3">
          <li *ngFor="let point of project.highlights" class="text-xs text-gray-500 leading-relaxed">{{ point }}</li>
        </ul>

        <!-- Tech stack icon tags -->
        <div class="flex flex-wrap gap-1.5">
          <div *ngFor="let tech of project.techStack"
               class="flex items-center gap-1 border-2 border-sky-100 bg-white rounded-lg h-7 px-2
                      hover:border-blue-300 transition-colors duration-150">
            <img [src]="tech.icon" [alt]="tech.name"
                 class="w-4 h-4 object-contain"
                 onerror="this.style.display='none'">
            <span class="text-xs font-semibold text-gray-700">{{ tech.name }}</span>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
